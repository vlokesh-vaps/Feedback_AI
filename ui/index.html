<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback Assistant</title>
  <style>
    :root {
      --bg: #f8f5ef;
      --panel: #fffdf9;
      --ink: #1d1b18;
      --muted: #6b645c;
      --accent: #0f766e;
      --accent-2: #f59e0b;
      --border: #e9dfd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #fff2d9 0, transparent 35%),
        radial-gradient(circle at 90% 90%, #d8f3ef 0, transparent 40%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .app {
      width: min(820px, 100%);
      height: min(86vh, 760px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 14px 44px rgba(40, 33, 21, 0.12);
      overflow: hidden;
    }
    .top {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #fffaf0, #effcf8);
    }
    .top h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: .02em;
    }
    .top p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }
    .messages {
      padding: 20px;
      overflow-y: auto;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .bubble {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.4;
      font-size: .95rem;
      animation: fade .2s ease;
      white-space: pre-wrap;
    }
    .user {
      margin-left: auto;
      background: #e7fbf5;
      border: 1px solid #bfeee2;
    }
    .bot {
      background: #fff7e8;
      border: 1px solid #f0dfb5;
    }
    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: #fff;
    }
    input {
      width: 100%;
      border: 1px solid #d9cebf;
      border-radius: 10px;
      padding: 12px;
      font-size: .95rem;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      border: 0;
      border-radius: 10px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: wait; }
    .hint {
      font-size: .82rem;
      color: var(--muted);
      margin: 4px 2px 0;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 720px) {
      body { padding: 10px; }
      .app { height: 94vh; border-radius: 12px; }
      .bubble { max-width: 90%; }
      .composer { grid-template-columns: 1fr; }
      button { height: 42px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>Feedback Assistant</h1>
      <p>Share feedback, complaints, or compliments and get a concise AI response.</p>
    </header>

    <section id="messages" class="messages">
      <div class="bubble bot">Hi, I'm ready. What feedback would you like to share?</div>
    </section>

    <form id="form" class="composer">
      <input id="text" type="text" placeholder="Type your feedback..." autocomplete="off" required />
      <button id="send" type="submit">Send</button>
      <p class="hint">API endpoint: <code>/chat</code></p>
    </form>
  </main>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('text');
    const sendBtn = document.getElementById('send');
    const messagesEl = document.getElementById('messages');

    const history = [];

    function addBubble(role, content) {
      const div = document.createElement('div');
      div.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addBubble('user', text);
      history.push({ role: 'user', content: text });
      input.value = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history })
        });

        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data?.detail || 'Request failed');
        }

        const reply = data.reply || 'Thanks for sharing your feedback.';
        addBubble('assistant', reply);
        history.push({ role: 'assistant', content: reply });
      } catch (err) {
        addBubble('assistant', 'Sorry, something went wrong. Please try again.');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
